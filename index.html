<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- MRBD display is 600x600. Lock the viewport so the simulator/glasses map 1:1. -->
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <!-- Required by MRBD: description + capability flag. The capability flag also
       enables the additive (black=transparent) 600x600 display mode on-device. -->
  <meta name="description" content="D&amp;D companion for Meta Ray-Ban Display: spells, character modifiers, initiative, and dice." />
  <meta name="mrbd-web-app-capable" content="yes" />
  <title>Grimoire — MRBD</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 600x600 stage; content kept inside a 550x550 safe area (see styles.css).
       tabindex makes the stage a focusable element (needed for D-pad detection). -->
  <main id="app" tabindex="0" aria-live="polite"></main>
  <footer id="hint" aria-hidden="true"></footer>

  <!-- data -->
  <script src="data/spells.js"></script>
  <!-- core -->
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <!-- feature modules -->
  <script src="js/spells.js"></script>
  <script src="js/character.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/dice.js"></script>
  <!-- boot (hub + input) -->
  <script src="js/app.js"></script>
</body>
</html>
